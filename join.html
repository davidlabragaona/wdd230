<body>
    <header>
        <img id="profile" alt="David Labra Gaona profile" src="images/profile.jpg" width="150" height="150">
        <span>David Labra Gaona</span>
        <img id="drkBtn" src="images/dark-theme.svg" alt="dark-mode">
    </header>
    <button id="menu"></button>
    <nav>
        <ul>
            <li><a class="active" href="#">Home</a></li>
            <li><a href="#">Chamber</a></li>
            <li><a href="week01/chamber-site-plan.html">Site Plan</a></li>
            <li><a href="form.html">Form</a></li>
        </ul>

    </nav>
    <main>
        <h1>Join Us</h1>
        <form action="thankyou.html" method="get">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="position">Title/Position:</label>
            <input type="text" id="position" name="position" pattern="[A-Za-z -]{7,}" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@example.com">

            <label for="phone">Mobile Phone:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="organization">Organization Name:</label>
            <input type="text" id="organization" name="organization" required>

            <label for="membership_level">Membership Level:</label>
            <select id="membership_level" name="membership_level">
                <option value="NP">NP Membership (Free)</option>
                <option value="Bronze">Bronze Membership</option>
                <option value="Silver">Silver Membership</option>
                <option value="Gold">Gold Membership</option>
            </select>

            <label for="description">Organization Description:</label>
            <textarea id="description" name="description"></textarea>

            <input type="hidden" id="timestamp" name="timestamp" value="">

            <input type="submit" value="Submit">
        </form>

        <div class="membership-benefits">
            <p>Membership benefit #1</p>
            <p>Membership benefit #2</p>
            <p>Membership benefit #3</p>
        </div>
        

    </main>
    <footer>
        <p>

    </footer>
    <script src="scripts/getDates.js"></script>
    <script src="scripts/common.js"></script>
</body>

</html>
